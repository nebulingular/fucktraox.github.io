<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Confiscated</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
body {
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;

  background:
    linear-gradient(to bottom, transparent 0%, transparent 50%, #f5f5f5 50%, #f5f5f5 100%),
    url("https://img.freepik.com/free-vector/matrix-style-binary-code-digital-falling-numbers-blue-background_1017-37387.jpg");

  background-size: 100% 100%, auto 50vh;
  background-position: top left, top center;
  background-repeat: no-repeat, repeat-x;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  color: #111;
}

    .notice {
      width: min(92vw, 860px);
      background: #ffffff;
      border: 1px solid #c9c9c9;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
    }

    .top-bar {
      background: #101010;
      color: white;
      padding: 18px 26px;
      text-align: center;
      border-bottom: 5px solid #b89646;
      letter-spacing: 1.6px;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 14px;
    }

    .content {
      padding: 42px 34px 36px;
      text-align: center;
    }

    .seal {
      width: 210px;
      max-width: 55vw;
      margin-bottom: 28px;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.25));
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 5vw, 54px);
      text-transform: uppercase;
      letter-spacing: 1.4px;
      margin-bottom: 16px;
      color: #111;
    }

    .subtitle {
      font-size: clamp(17px, 2.4vw, 22px);
      line-height: 1.55;
      max-width: 720px;
      margin: 0 auto 24px;
      color: #242424;
    }

    .joke {
      display: inline-block;
      margin: 10px 0 28px;
      padding: 8px 14px;
      border: 1px solid #b89646;
      background: #fff8e6;
      color: #4b3710;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .contact-box {
      margin: 0 auto;
      max-width: 620px;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 22px 12px;
      font-size: 18px;
      line-height: 1.5;
    }

    .contact-box span {
      display: block;
      color: #555;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
    }

    .contact-box a {
      color: #0b3f7a;
      font-weight: 700;
      text-decoration: none;
      word-break: break-word;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    .footer {
      padding: 16px 24px;
      background: #f2f2f2;
      color: #666;
      text-align: center;
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid #ddd;
    }

    .footer strong {
      color: #333;
    }

    @media (max-width: 520px) {
      .content {
        padding: 32px 20px 28px;
      }

      .seal {
        width: 170px;
      }

      .top-bar {
        font-size: 12px;
        padding: 15px 18px;
      }
    }
  </style>
</head>

<body>
  <main class="notice">
    <div class="top-bar">
      Website Confiscated because Bulgaria is bad
    </div>

    <section class="content">
      <img
        class="seal"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/Seal_of_the_FBI.svg/3840px-Seal_of_the_FBI.svg.png"
        alt="FBI seal"
      />

      <h1>Website Confiscated</h1>

      <p class="subtitle">
        This website has been confiscated by the
        <strong>Federal Bureau of Investigation</strong>.
      </p>

      <div class="contact-box">
        <span>For more information, contact the domain owner</span>
        <a href="mailto:femcheal6969@gmail.com">femcheal6969@gmail.com</a>
      </div>
    </section>
  </main>
</body>
</html>
